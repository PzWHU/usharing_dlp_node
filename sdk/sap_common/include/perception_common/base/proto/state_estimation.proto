syntax = "proto2";
package senseAD.perception;

message TrackerCoreParameter {
    required float largest_time_gap = 1 [default = 1];
    required float prograte_time_gap = 2 [default = 5];
    required float clear_old_than = 3 [default = 10];
    required float add_newstate_time_gap = 4 [default = 0.002];
}

message DepthTrackerParameter {
    required string motion_model_type = 1 [default = "CAProcessModel"];
    required string filter_type = 2 [default = "ExtendedKalmanFilter"];
    optional float cp_process_noise_cov_base_q = 3 [default = 3];
    optional float cp_process_noise_yaw_cov_base_q = 4 [default = 0.1];
    optional float cv_process_noise_cov_base_q = 5 [default = 3];
    optional float cv_process_noise_yaw_cov_base_q = 6 [default = 0.1];
    optional float ca_process_noise_cov_base_q = 7 [default = 3];
    optional float ca_process_noise_yaw_cov_base_q = 8 [default = 0.1];
    optional float ct_process_noise_cov_base_q = 9 [default = 1.6];
    optional float ct_process_noise_yaw_cov_base_q = 10 [default = 1.9];
    optional float lidar_measurement_noise_cov_base_r = 11 [default = 0.1];
    optional float radar_measurement_noise_cov_base = 12 [default = 1];
    optional float camera_measurement_noise_cov_base_r = 13 [default = 1];
    required TrackerCoreParameter tracker_core_param = 14;
    optional bool is_radar_position_measurement_valid = 15 [default = false];
    optional bool is_optimze_yaw = 16 [default = false];
    optional float ctrv_process_noise_vel_cov_base_q = 17 [default = 1.6];
    optional float ctrv_process_noise_yaw_cov_base_q = 18 [default = 1.9];
    optional OptimzeSensorsPositionBias optimze_meas_bias_params = 19;
    optional string main_sensor = 20 [default = "front_lidar"];
    repeated string measure_types = 21;
    repeated uint64 measure_dims = 22;
    optional uint64 state_dim = 23 [default = 10];
    optional string measure_type = 24 [default = "lidar"];
    optional uint64 measure_dim = 25 [default = 2];
    optional float camera_measurement_range_noise_cov_base = 26 [default = 1.0];
    optional float camera_measurement_angle_noise_cov_base = 27 [default = 1.0];
    optional float range_low_threshold = 28 [default = 10.0];
    optional float range_high_threshold = 29 [default = 40.0];
    optional float process_cov_base_p = 30 [default = 0.1];
    optional float cj_process_noise_cov_base_q = 31 [default = 0.1];
    optional float cj_process_noise_yaw_cov_base_q = 32 [default = 0.1];
    optional float velocity_weight_in_process = 33 [default = 1];
    optional float accelerate_weight_in_process = 34 [default = 1];
    optional float jerk_weight_in_process = 35 [default = 1];
    optional float max_camera_weight_change_threshold = 36 [default = 0.4];
    optional float min_camera_weight_sum_threshold = 37 [default = 0.5];
    optional float camera_position_measurement_x_noise_cov_base_r = 38 [default = 1];
    optional float camera_position_measurement_y_noise_cov_base_r = 39 [default = 1];
    optional float camera_velocity_measurement_x_noise_cov_base_r = 40 [default = 1];
    optional float camera_velocity_measurement_y_noise_cov_base_r = 41 [default = 1];
    optional bool set_camera_measurement_noise_with_uncertainty = 42 [default = false];
    optional float camera_acceleration_measurement_x_noise_cov_base_r = 43 [default = 1];
    optional float position_measurement_x_bias_noise_cov = 44 [default = 1];
    optional float camera_lateral_velocity_noise_cov_base_r = 45 [default = 0.2];
    optional float camera_acceleration_measurement_y_noise_cov_base_r = 46 [default = 1];
    optional float yaw_rate_threshold = 47 [default = 1000];
    optional float acceleration_threshold = 48 [default = 100];
    optional float acceleration_x_threshold = 49 [default = 100];
    optional float acceleration_y_threshold = 50 [default = 100];
    optional float lidar_measurement_velocity_noise_cov_y_base_r = 51 [default = 0.1];
    optional float lidar_measurement_velocity_noise_cov_x_base_r = 52 [default = 0.5];
    optional float velocity_x_threshold = 53 [default = 100];
    optional float velocity_y_threshold = 54 [default = 100];
    optional float camera_yaw_rate_noise = 55 [default = 0.005];
    optional bool is_add_process_noise_bias = 56 [default = false];
    repeated float process_noise_bias = 57;
}

message OptimzeSensorsPositionBias {
    required float max_sensors_time_gap = 1 [default = 0.05];
    required float max_meas_distance = 2 [default = 50];
    repeated string process_class_labels = 3;
    required bool is_optimze_lidar_radar_bias = 4 [default = false];
    required bool is_optimze_camera_radar_bias = 5 [default = false];
}

message IMMTrackerParameter {
    repeated DepthTrackerParameter depth_tracker_param = 1;
    repeated float model_prob = 2;
    repeated float transfer_prob = 3;
    repeated float adjacent_mat = 4;
    optional string imm_filter_name = 5 [default = "IMMFilter"];
    optional bool using_batch_filter = 6 [default = false];
    optional uint32 local_win_size = 7 [default = 1];
}

message EstimatorParameter {
    required IMMTrackerParameter imm_tracker_param = 1;
    optional string initial_measure_model = 2 [default = "center_camera"];
    optional string estimator_core_name = 3 [default = "IMMEstimatorCore"];
    optional uint32 local_transform_win_size = 4 [default = 1];
    optional bool is_use_unstable_obs = 5 [default = true];
    optional float unstable_state_diff = 6 [default = 10.0];
    optional float unstable_distance = 7 [default = 60.0];
    optional float allow_unstable_hits = 8 [default = 5];
    optional DetectionOutlierParameter detection_outlier_param = 9;
    optional string measurement_model_name = 10;
}

message GraphTrackerParameter {
    repeated DepthTrackerParameter depth_tracker_param = 1;
    repeated float depth_tracker_weight = 2;
    required uint64 vel_acc_fitting_data_size = 3 [default = 4];
    required uint64 angular_rate_fitting_data_size = 4 [default = 4];
    required uint64 min_cal_vel_acc_size = 5 [default = 4];
    required bool optimize_yaw_rate = 6 [default = true];
}

message DetectionOutlierParameter {
    optional float chi_squared_outlier_threshold = 1 [default = 0.001];
    optional float covariance_decay_time = 2 [default = 0.5];
    optional float mean_decay_time = 3 [default = 0.5];
    optional bool filter_outliers = 4 [default = true];
    optional bool adptive_chi_squared_test = 5 [default = false];
    optional bool using_chi_squared_test = 6 [default = false];
    optional uint32 strick_number = 7 [default = 5];
}

message NoisePathParameter {
    required string meta_path = 1;
    required string data_path = 2;
    required string sensor_name = 3;
}

message EstimatorNoiseParamsParameter {
    repeated NoisePathParameter noise_path_param = 1;
    required float camera_measurement_noise_cov_base_r = 2 [default = 0.1];
    optional DetectionOutlierParameter online_estimator_params = 3;
    repeated string noise_estimator_type = 4;
    optional float reset_time_gap = 5 [default = 1];
    optional string resource_root_path = 6 [default = "/usr/local/senseauto/perception/resource/"];
    optional float rear_camera_scale = 7 [default = 0.05];
    optional float front_camera_scale = 8 [default = 0.03];
}
